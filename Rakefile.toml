# =============================================================================
# Rakefile.toml — salus build pipeline
# =============================================================================

# ---------------------------------------------------------------------------
# tools
# ---------------------------------------------------------------------------

[tool.cargo.matrix]
crate = "cargo-matrix"
check = ["cargo", "matrix", "--version"]
install = ["cargo", "install", "cargo-matrix", "--force", "--locked"]
update = true

[tool.cargo.nextest]
crate = "cargo-nextest"
check = ["cargo", "nextest", "--version"]
install = ["cargo", "install", "cargo-nextest", "--force", "--locked"]
update = true

[tool.cargo.llvm-cov]
crate = "cargo-llvm-cov"
check = ["cargo", "llvm-cov", "--version"]
install = ["cargo", "install", "cargo-llvm-cov", "--force", "--locked"]
update = true

[tool.cargo.fuzz]
crate = "cargo-fuzz"
check = ["cargo", "fuzz", "--version"]
install = ["cargo", "install", "cargo-fuzz", "--force", "--locked"]
update = true

[tool.os.docker]
check = ["docker", "--version"]
hint = "install Docker: https://docs.docker.com/get-docker/"

[tool.fish.puc]
hint = "The 'puc' fish function is required to run this target"

# ---------------------------------------------------------------------------
# update
# ---------------------------------------------------------------------------

[target.puc]
tools = ["puc"]
[[target.puc.command]]
name = "puc"
platform = ["linux"]
fish = "puc"

# ---------------------------------------------------------------------------
# fmt
# ---------------------------------------------------------------------------

[[target.fmt.command]]
name = "fmt"
cmd = ["cargo", "fmt"]

[[target.fmt.command]]
name = "fmt check"
cmd = ["cargo", "fmt", "--all", "--", "--check"]

# ---------------------------------------------------------------------------
# clippy
# ---------------------------------------------------------------------------

[target.clippy]
tools = ["matrix"]

[[target.clippy.command]]
name = "clippy"
cmd = ["cargo", "matrix", "clippy", "--all-targets", "--", "-Dwarnings"]

# ---------------------------------------------------------------------------
# build
# ---------------------------------------------------------------------------

[target.build]
tools = ["matrix"]

[[target.build.command]]
name = "build"
cmd = ["cargo", "matrix", "build"]

# ---------------------------------------------------------------------------
# test
# ---------------------------------------------------------------------------

[target.test]
depends_on = ["build"]
tools = ["matrix", "nextest"]

[[target.test.command]]
name = "nextest"
cmd = ["cargo", "matrix", "nextest", "run"]

[[target.test.command]]
name = "doc test"
cmd = ["cargo", "test", "-p", "libsalus", "--doc"]

[[target.test.command]]
name = "fuzz nextest"
fish = "cd fuzz; and cargo matrix nextest run"
sh = "cd fuzz && cargo matrix nextest run"

# ---------------------------------------------------------------------------
# docs
# ---------------------------------------------------------------------------

[[target.docs.command]]
name = "docs"
cmd = ["cargo", "doc", "-p", "libsalus"]

# ---------------------------------------------------------------------------
# coverage
# ---------------------------------------------------------------------------

[target.coverage]
depends_on = ["test"]
tools = ["llvm-cov", "matrix", "nextest"]

[[target.coverage.command]]
name = "coverage"
cmd = ["cargo", "matrix", "-F", "unstable", "llvm-cov", "nextest", "--no-report"]

[[target.coverage.command]]
name = "lcov.info"
cmd = ["cargo", "llvm-cov", "report", "--lcov", "--output-path", "lcov.info"]

[[target.coverage.command]]
name = "html"
cmd = ["cargo", "llvm-cov", "report", "--html"]

# ---------------------------------------------------------------------------
# fuzz  (requires nightly; no +nightly prefix)
# ---------------------------------------------------------------------------

[target.fuzz]
tools = ["fuzz"]

[[target.fuzz.command]]
name = "fuzz_action_decode"
cmd = ["cargo", "fuzz", "run", "fuzz_action_decode", "--", "-max_total_time=30"]

[[target.fuzz.command]]
name = "fuzz_response_decode"
cmd = ["cargo", "fuzz", "run", "fuzz_response_decode", "--", "-max_total_time=30"]

[[target.fuzz.command]]
name = "fuzz_unlock_key"
cmd = ["cargo", "fuzz", "run", "fuzz_unlock_key", "--", "-max_total_time=30"]

[[target.fuzz.command]]
name = "fuzz_store_roundtrip"
cmd = ["cargo", "fuzz", "run", "fuzz_store_roundtrip", "--", "-max_total_time=30"]

[[target.fuzz.command]]
name = "fuzz_find_regex"
cmd = ["cargo", "fuzz", "run", "fuzz_find_regex", "--", "-max_total_time=30"]

[[target.fuzz.command]]
name = "fuzz_agent_action_decode"
cmd = ["cargo", "fuzz", "run", "fuzz_agent_action_decode", "--", "-max_total_time=30"]

[[target.fuzz.command]]
name = "fuzz_agent_response_decode"
cmd = ["cargo", "fuzz", "run", "fuzz_agent_response_decode", "--", "-max_total_time=30"]

[[target.fuzz.command]]
name = "fuzz_agent_unseal"
cmd = ["cargo", "fuzz", "run", "fuzz_agent_unseal", "--", "-max_total_time=30"]

[[target.fuzz.command]]
name = "fuzz_agent_registry_decode"
cmd = ["cargo", "fuzz", "run", "fuzz_agent_registry_decode", "--", "-max_total_time=30"]

[[target.fuzz.command]]
name = "fuzz_db_value_decode"
cmd = ["cargo", "fuzz", "run", "fuzz_db_value_decode", "--", "-max_total_time=30"]

# ---------------------------------------------------------------------------
# install
# ---------------------------------------------------------------------------

[[target.install.command]]
name = "install salusd"
cmd = ["cargo", "install", "--path", "salusd", "--force", "--locked"]

[[target.install.command]]
name = "install salusc"
cmd = ["cargo", "install", "--path", "salusc", "--force", "--locked"]

[[target.install.command]]
name = "install salus-agent"
cmd = ["cargo", "install", "--path", "salus-agent", "--force", "--locked"]

# ---------------------------------------------------------------------------
# musl  (regular build)
# ---------------------------------------------------------------------------

[target.musl]
tools = ["docker"]

[[target.musl.command]]
name = "docker build"
platform = ["linux", "macos"]
fish = "docker run -v cargo-cache:/root/.cargo/registry -v (pwd):/home/rust/src -v ~/.gitconfig:/root/.gitconfig:ro --rm -t blackdex/rust-musl:x86_64-musl-stable cargo build --release --bin salusd --bin salusc --bin salus-agent"
sh = "docker run -v cargo-cache:/root/.cargo/registry -v \"$(pwd)\":/home/rust/src -v \"$HOME/.gitconfig\":/root/.gitconfig:ro --rm -t blackdex/rust-musl:x86_64-musl-stable cargo build --release --bin salusd --bin salusc --bin salus-agent"

[[target.musl.command]]
name = "chown"
platform = ["linux", "macos"]
fish = "sudo chown -R $USER:$USER target/"
sh = "sudo chown -R $USER:$USER target/"

[[target.musl.command]]
name = "copy salusd"
platform = ["linux", "macos"]
fish = "cp target/x86_64-unknown-linux-musl/release/salusd ~/salusd"
sh = "cp target/x86_64-unknown-linux-musl/release/salusd $HOME/salusd"

[[target.musl.command]]
name = "copy salusc"
platform = ["linux", "macos"]
fish = "cp target/x86_64-unknown-linux-musl/release/salusc ~/salusc"
sh = "cp target/x86_64-unknown-linux-musl/release/salusc $HOME/salusc"

[[target.musl.command]]
name = "copy salus-agent"
platform = ["linux", "macos"]
fish = "cp target/x86_64-unknown-linux-musl/release/salus-agent ~/salus-agent"
sh = "cp target/x86_64-unknown-linux-musl/release/salus-agent $HOME/salus-agent"

# ---------------------------------------------------------------------------
# musl-unstable  (with --features unstable)
# ---------------------------------------------------------------------------

[target.musl-unstable]
tools = ["docker"]

[[target.musl-unstable.command]]
name = "docker build"
platform = ["linux", "macos"]
fish = "docker run -v cargo-cache:/root/.cargo/registry -v (pwd):/home/rust/src -v ~/.gitconfig:/root/.gitconfig:ro --rm -t blackdex/rust-musl:x86_64-musl-stable cargo build --release --features unstable --bin salusd --bin salusc --bin salus-agent"
sh = "docker run -v cargo-cache:/root/.cargo/registry -v \"$(pwd)\":/home/rust/src -v \"$HOME/.gitconfig\":/root/.gitconfig:ro --rm -t blackdex/rust-musl:x86_64-musl-stable cargo build --release --features unstable --bin salusd --bin salusc --bin salus-agent"

[[target.musl-unstable.command]]
name = "chown"
platform = ["linux", "macos"]
fish = "sudo chown -R $USER:$USER target/"
sh = "sudo chown -R $USER:$USER target/"

[[target.musl-unstable.command]]
name = "copy salusd"
platform = ["linux", "macos"]
fish = "cp target/x86_64-unknown-linux-musl/release/salusd ~/salusd"
sh = "cp target/x86_64-unknown-linux-musl/release/salusd $HOME/salusd"

[[target.musl-unstable.command]]
name = "copy salusc"
platform = ["linux", "macos"]
fish = "cp target/x86_64-unknown-linux-musl/release/salusc ~/salusc"
sh = "cp target/x86_64-unknown-linux-musl/release/salusc $HOME/salusc"

[[target.musl-unstable.command]]
name = "copy salus-agent"
platform = ["linux", "macos"]
fish = "cp target/x86_64-unknown-linux-musl/release/salus-agent ~/salus-agent"
sh = "cp target/x86_64-unknown-linux-musl/release/salus-agent $HOME/salus-agent"

# ---------------------------------------------------------------------------
# clean
# ---------------------------------------------------------------------------

[[target.clean.command]]
name = "clean"
cmd = ["cargo", "clean"]

[[target.clean.command]]
name = "rm lcov.info"
fish = "rm -f lcov.info"
sh = "rm -f lcov.info"
ps = "Remove-Item -Force lcov.info -ErrorAction Ignore"

# ---------------------------------------------------------------------------
# aggregates
# ---------------------------------------------------------------------------

[target.most]
depends_on = ["fmt", "clippy", "build", "test", "docs", "coverage"]

[target.daily]
depends_on = ["all", "^fuzz", "^install"]

[target.all]
depends_on = ["puc", "fmt", "clippy", "build", "test", "docs", "coverage", "fuzz", "install", "musl", "clean"]

[target.default]
depends_on = ["most"]
