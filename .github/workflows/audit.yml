on:
  workflow_dispatch:
  # Trigger the workflow on push to master or any pull request
  # Ignore all tags
  push:
    branches:
      - master
    tags-ignore:
      - "*"
  pull_request:
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron: "22 3 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

name: 💣 Audit 💣

jobs:
  audit-check:
    runs-on: ubuntu-latest
    name: 💣 Audit 💣
    permissions:
      contents: read
      issues: write
    steps:
      - name: ✅ Checkout ✅
        uses: Wandalen/wretry.action@71a909ebf09f3ffdc6f42a17bd54ecb43481da49 # v3.8.0
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          attempt_limit: 3
          attempt_delay: 30000

      - name: 💣 Audit 💣
        # v0
        uses: rustyhorde/audit-check@f7875ca3428c17cce4d5a141ea1128568db8b6c2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          deny: warnings
          create_issue: ${{ github.event_name != 'pull_request' }}

  audit-fuzz:
    runs-on: ubuntu-latest
    name: 💣 Audit Fuzz 💣
    permissions:
      contents: read
      issues: write
    steps:
      - name: ✅ Checkout ✅
        uses: Wandalen/wretry.action@71a909ebf09f3ffdc6f42a17bd54ecb43481da49 # v3.8.0
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          attempt_limit: 3
          attempt_delay: 30000

      # The fuzz crate is excluded from the workspace, so the audit above never
      # sees its dependencies. `audit-check` runs `cargo audit` against the
      # repo-root `Cargo.lock`, so promote the fuzz lockfile into place first.
      - name: 📦 Stage fuzz lockfile 📦
        run: cp fuzz/Cargo.lock Cargo.lock

      - name: 💣 Audit 💣
        # v0
        uses: rustyhorde/audit-check@f7875ca3428c17cce4d5a141ea1128568db8b6c2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          deny: warnings
          create_issue: ${{ github.event_name != 'pull_request' }}

  fuzz-smoke:
    name: 🧪 Fuzz Smoke Test 🧪
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: ✅ Checkout ✅
        uses: Wandalen/wretry.action@71a909ebf09f3ffdc6f42a17bd54ecb43481da49 # v3.8.0
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          attempt_limit: 3
          attempt_delay: 30000

      - name: 🦀 Install nightly Rust 🦀
        # master
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly

      - name: 📦 Install cargo-fuzz 📦
        run: cargo install cargo-fuzz

      - name: 🧪 Replay fuzz regression corpus 🧪
        run: cargo test --manifest-path fuzz/Cargo.toml

      - name: 🧪 Fuzz fuzz_action_decode (30 s) 🧪
        run: cargo +nightly fuzz run fuzz_action_decode -- -max_total_time=30

      - name: 🧪 Fuzz fuzz_response_decode (30 s) 🧪
        run: cargo +nightly fuzz run fuzz_response_decode -- -max_total_time=30

      - name: 🧪 Fuzz fuzz_unlock_key (30 s) 🧪
        run: cargo +nightly fuzz run fuzz_unlock_key -- -max_total_time=30

      - name: 🧪 Fuzz fuzz_store_roundtrip (30 s) 🧪
        run: cargo +nightly fuzz run fuzz_store_roundtrip -- -max_total_time=30

      - name: 🧪 Fuzz fuzz_find_regex (30 s) 🧪
        run: cargo +nightly fuzz run fuzz_find_regex -- -max_total_time=30

      - name: 🧪 Fuzz fuzz_agent_action_decode (30 s) 🧪
        run: cargo +nightly fuzz run fuzz_agent_action_decode -- -max_total_time=30

      - name: 🧪 Fuzz fuzz_agent_response_decode (30 s) 🧪
        run: cargo +nightly fuzz run fuzz_agent_response_decode -- -max_total_time=30

      - name: 🧪 Fuzz fuzz_agent_unseal (30 s) 🧪
        run: cargo +nightly fuzz run fuzz_agent_unseal -- -max_total_time=30

      - name: 🧪 Fuzz fuzz_agent_registry_decode (30 s) 🧪
        run: cargo +nightly fuzz run fuzz_agent_registry_decode -- -max_total_time=30

      - name: 🧪 Fuzz fuzz_db_value_decode (30 s) 🧪
        run: cargo +nightly fuzz run fuzz_db_value_decode -- -max_total_time=30

      - name: 💾 Upload crash artifacts (if any) 💾
        if: failure()
        # v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: fuzz-crashes-${{ github.run_id }}
          path: |
            fuzz/artifacts/fuzz_action_decode/
            fuzz/artifacts/fuzz_response_decode/
            fuzz/artifacts/fuzz_unlock_key/
            fuzz/artifacts/fuzz_store_roundtrip/
            fuzz/artifacts/fuzz_find_regex/
            fuzz/artifacts/fuzz_agent_action_decode/
            fuzz/artifacts/fuzz_agent_response_decode/
            fuzz/artifacts/fuzz_agent_unseal/
            fuzz/artifacts/fuzz_agent_registry_decode/
            fuzz/artifacts/fuzz_db_value_decode/
          if-no-files-found: ignore
