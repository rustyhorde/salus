on:
  push:
    tags:
      - "v[0-9]*"        # full release
      - "v[0-9]*-rc*"    # pre-release / build test only

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

name: 🚀 Release 🚀

jobs:
  # ── Build static MUSL Linux binaries ─────────────────────────────────────────
  build:
    name: 🔨 Build Linux Binaries 🔨
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      pkgver: ${{ steps.version.outputs.pkgver }}
    steps:
      - name: Checkout
        uses: Wandalen/wretry.action@71a909ebf09f3ffdc6f42a17bd54ecb43481da49 # v3.8.0
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
          attempt_limit: 3
          attempt_delay: 30000

      - name: Extract version from tag
        id: version
        run: echo "pkgver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        # stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: 💾 Install (cargo-binstall) 💾
        uses: cargo-bins/cargo-binstall@1c2b96c2b86875d56caeec7b7ee9980812daf0d9 # main

      - name: 💾 Install (cross) 💾
        run: cargo binstall --no-confirm --no-symlinks --no-discover-github-token cross --version 0.2.5

      - name: Cache cargo registry
        # v5
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build x86_64 cross Docker image
        run: |
          docker build \
            -t salus-cross-x86_64 \
            -f docker/Dockerfile.x86_64-unknown-linux-musl \
            docker/

      - name: Build x86_64-unknown-linux-musl
        run: |
          cross build --release --locked \
            --target x86_64-unknown-linux-musl \
            --bin salusd --bin salusc --bin salus-agent
          cp target/x86_64-unknown-linux-musl/release/salusd salusd-x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/salusc salusc-x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/salus-agent salus-agent-x86_64-unknown-linux-musl

      - name: Build aarch64 cross Docker image
        run: |
          docker build \
            -t salus-cross-aarch64 \
            -f docker/Dockerfile.aarch64-unknown-linux-musl \
            docker/

      - name: Build aarch64-unknown-linux-musl
        run: |
          cross build --release --locked \
            --target aarch64-unknown-linux-musl \
            --bin salusd --bin salusc --bin salus-agent
          cp target/aarch64-unknown-linux-musl/release/salusd salusd-aarch64-unknown-linux-musl
          cp target/aarch64-unknown-linux-musl/release/salusc salusc-aarch64-unknown-linux-musl
          cp target/aarch64-unknown-linux-musl/release/salus-agent salus-agent-aarch64-unknown-linux-musl

      - name: Generate xtask dist artifacts
        run: |
          cargo run --locked -p xtask -- dist salusd
          cargo run --locked -p xtask -- dist salusc
          cargo run --locked -p xtask -- dist salus-agent

      - name: Create dist tarball
        run: tar -czf dist-salus.tar.gz -C dist salusd salusc salus-agent

      - name: Stage release assets
        run: |
          mkdir -p release-assets
          cp salusd-x86_64-unknown-linux-musl      release-assets/
          cp salusc-x86_64-unknown-linux-musl      release-assets/
          cp salus-agent-x86_64-unknown-linux-musl release-assets/
          cp salusd-aarch64-unknown-linux-musl     release-assets/
          cp salusc-aarch64-unknown-linux-musl     release-assets/
          cp salus-agent-aarch64-unknown-linux-musl release-assets/
          cp dist-salus.tar.gz                     release-assets/

      - name: Install nfpm
        run: |
          NFPM_VERSION="2.43.0"
          curl -sSL \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz -C /usr/local/bin nfpm
          nfpm --version

      - name: Build Debian and RPM packages
        env:
          VERSION: ${{ steps.version.outputs.pkgver }}
        run: |
          for packager in deb rpm; do
            nfpm package \
              --config packaging/nfpm/salus.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/salus-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
          done

      - name: Upload release assets artifact
        # v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-assets
          path: release-assets/

  # ── Build macOS binaries (for Homebrew) ──────────────────────────────────────
  build-macos:
    name: 🍎 Build macOS Binaries 🍎
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: Wandalen/wretry.action@71a909ebf09f3ffdc6f42a17bd54ecb43481da49 # v3.8.0
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
          attempt_limit: 3
          attempt_delay: 30000

      - name: Install Rust
        # stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Cache cargo registry
        # v5
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build aarch64-apple-darwin
        run: |
          cargo build --release --locked \
            --target aarch64-apple-darwin \
            --bin salusd --bin salusc --bin salus-agent

      - name: Generate xtask dist artifacts
        run: |
          cargo run --locked -p xtask -- dist salusd
          cargo run --locked -p xtask -- dist salusc
          cargo run --locked -p xtask -- dist salus-agent

      - name: Bundle macOS tarball
        run: |
          cp target/aarch64-apple-darwin/release/salusd dist/salusd/salusd
          cp target/aarch64-apple-darwin/release/salusc dist/salusc/salusc
          cp target/aarch64-apple-darwin/release/salus-agent dist/salus-agent/salus-agent
          tar -czf salus-aarch64-apple-darwin.tar.gz -C dist salusd salusc salus-agent

      - name: Upload macOS release assets
        # v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-assets-macos
          path: salus-aarch64-apple-darwin.tar.gz

  # ── Create GitHub release ────────────────────────────────────────────────────
  release:
    name: 📝 Create GitHub Release 📝
    if: "!contains(github.ref_name, '-rc')"
    needs: [build, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tarball_sha256: ${{ steps.sha256.outputs.tarball_sha256 }}
    steps:
      - name: Download release assets
        # v8
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-assets
          path: release-assets/

      - name: Download macOS release assets
        # v8
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-assets-macos
          path: release-assets/

      - name: Download source tarball from GitHub
        run: |
          curl -sSL \
            "https://github.com/${{ github.repository }}/archive/${{ github.ref_name }}.tar.gz" \
            -o "salus-${{ needs.build.outputs.pkgver }}.tar.gz"

      - name: Compute source tarball sha256
        id: sha256
        run: |
          SHA=$(sha256sum "salus-${{ needs.build.outputs.pkgver }}.tar.gz" | awk '{print $1}')
          echo "tarball_sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        # v3
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/*
            salus-${{ needs.build.outputs.pkgver }}.tar.gz

  # ── Publish crates to crates.io ──────────────────────────────────────────────
  publish-crates:
    name: 📦 Publish to crates.io 📦
    if: "!contains(github.ref_name, '-rc')"
    needs: [build, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - name: Checkout
        uses: Wandalen/wretry.action@71a909ebf09f3ffdc6f42a17bd54ecb43481da49 # v3.8.0
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
          attempt_limit: 3
          attempt_delay: 30000

      - name: Install Rust
        # stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Publish crates in dependency order
        run: |
          set -euo pipefail
          # libsalus must land first; salus-agent, salusd and salusc depend on it
          # by version, and salusc additionally depends on salus-agent.
          # `cargo publish` blocks until the crate is queryable, but the index can
          # still lag for dependents, so retry the dependent publishes.
          publish_with_retry() {
            local crate="$1"
            for attempt in 1 2 3 4 5; do
              if cargo publish -p "$crate" --locked --no-verify; then
                return 0
              fi
              echo "Publish of ${crate} attempt ${attempt} failed; waiting 30s for the index..."
              sleep 30
            done
            echo "All publish attempts for ${crate} failed."
            return 1
          }

          publish_with_retry libsalus
          publish_with_retry salus-agent
          publish_with_retry salusd
          publish_with_retry salusc

  # ── Update PKGBUILDs ─────────────────────────────────────────────────────────
  update-pkgbuilds:
    name: 📦 Update PKGBUILDs 📦
    if: "!contains(github.ref_name, '-rc')"
    needs: [build, release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: Wandalen/wretry.action@71a909ebf09f3ffdc6f42a17bd54ecb43481da49 # v3.8.0
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
          with: |
            token: ${{ secrets.GITHUB_TOKEN }}
          attempt_limit: 3
          attempt_delay: 30000

      - name: Download release assets
        # v8
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-assets
          path: release-assets/

      - name: Compute checksums for PKGBUILDs
        id: binsums
        run: |
          echo "dist_salus=$(sha256sum release-assets/dist-salus.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "x86_64_salusd=$(sha256sum release-assets/salusd-x86_64-unknown-linux-musl | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "x86_64_salusc=$(sha256sum release-assets/salusc-x86_64-unknown-linux-musl | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "x86_64_salus_agent=$(sha256sum release-assets/salus-agent-x86_64-unknown-linux-musl | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "aarch64_salusd=$(sha256sum release-assets/salusd-aarch64-unknown-linux-musl | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "aarch64_salusc=$(sha256sum release-assets/salusc-aarch64-unknown-linux-musl | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "aarch64_salus_agent=$(sha256sum release-assets/salus-agent-aarch64-unknown-linux-musl | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update source PKGBUILD
        env:
          PKGVER: ${{ needs.build.outputs.pkgver }}
          SHA256: ${{ needs.release.outputs.tarball_sha256 }}
        run: |
          PKGBUILD="packaging/arch/salus/PKGBUILD"
          sed -i "s/^pkgver=.*/pkgver=${PKGVER}/" "$PKGBUILD"
          sed -i "s/^pkgrel=.*/pkgrel=1/" "$PKGBUILD"
          sed -i "s|^sha256sums=.*|sha256sums=('${SHA256}')|" "$PKGBUILD"

      - name: Update binary PKGBUILD
        env:
          PKGVER:         ${{ needs.build.outputs.pkgver }}
          DIST_SALUS:          ${{ steps.binsums.outputs.dist_salus }}
          X86_64_SALUSD:       ${{ steps.binsums.outputs.x86_64_salusd }}
          X86_64_SALUSC:       ${{ steps.binsums.outputs.x86_64_salusc }}
          X86_64_SALUS_AGENT:  ${{ steps.binsums.outputs.x86_64_salus_agent }}
          AARCH64_SALUSD:      ${{ steps.binsums.outputs.aarch64_salusd }}
          AARCH64_SALUSC:      ${{ steps.binsums.outputs.aarch64_salusc }}
          AARCH64_SALUS_AGENT: ${{ steps.binsums.outputs.aarch64_salus_agent }}
        run: |
          PKGBUILD="packaging/arch/salus-bin/PKGBUILD"
          sed -i "s/^pkgver=.*/pkgver=${PKGVER}/" "$PKGBUILD"
          sed -i "s/^pkgrel=.*/pkgrel=1/" "$PKGBUILD"
          sed -i "s|^sha256sums=.*|sha256sums=('${DIST_SALUS}')|" "$PKGBUILD"
          sed -i "s|^sha256sums_x86_64=.*|sha256sums_x86_64=('${X86_64_SALUSD}' '${X86_64_SALUSC}' '${X86_64_SALUS_AGENT}')|" "$PKGBUILD"
          sed -i "s|^sha256sums_aarch64=.*|sha256sums_aarch64=('${AARCH64_SALUSD}' '${AARCH64_SALUSC}' '${AARCH64_SALUS_AGENT}')|" "$PKGBUILD"

      - name: Generate .SRCINFO files
        run: |
          set -euo pipefail
          for pkg_dir in packaging/arch/*/; do
            docker run --rm \
              -v "$(pwd)/${pkg_dir%/}:/pkg" \
              -w /pkg \
              archlinux:latest \
              bash -c "useradd -m builder && chown -R builder /pkg && su -s /bin/bash builder -c 'makepkg --printsrcinfo'" \
              > "${pkg_dir}.SRCINFO"
          done

      - name: Upload updated PKGBUILDs as artifact
        # v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pkgbuilds
          path: packaging/arch/
          include-hidden-files: true

      - name: Open PR to update PKGBUILDs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKGVER: ${{ needs.build.outputs.pkgver }}
        run: |
          BRANCH="chore/pkgbuild-v${PKGVER}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add packaging/arch/
          git diff --cached --quiet || git commit \
            -m "chore(packaging): update PKGBUILDs to v${PKGVER}"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(packaging): update PKGBUILDs to v${PKGVER}" \
            --body "Automated PKGBUILD update for release v${PKGVER}. AUR packages have already been published from this branch; merge to keep the in-tree PKGBUILDs in sync." \
            --base master \
            --head "$BRANCH"

  # ── Push to AUR ──────────────────────────────────────────────────────────────
  aur-publish:
    name: 🏹 Publish to AUR 🏹
    if: "!contains(github.ref_name, '-rc')"
    needs: [build, update-pkgbuilds]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      max-parallel: 2
      matrix:
        package:
          - salus
          - salus-bin
    steps:
      - name: Download updated PKGBUILDs
        # v8
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: pkgbuilds
          path: packaging/arch/

      - name: Publish ${{ matrix.package }} to AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          PKGNAME: ${{ matrix.package }}
          PKGVER: ${{ needs.build.outputs.pkgver }}
        run: |
          set -euo pipefail

          # SSH setup — env var preserves newlines natively; no YAML parsing involved
          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t rsa,ecdsa,ed25519 aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          printf 'Host aur.archlinux.org\n  IdentityFile ~/.ssh/aur\n  User aur\n' >> ~/.ssh/config
          chmod 600 ~/.ssh/config

          # Clone AUR repo
          git clone "ssh://aur@aur.archlinux.org/${PKGNAME}.git" /tmp/aur-repo
          cd /tmp/aur-repo
          # Handle all AUR repo states: normal (origin/master tracked), detached HEAD
          # (prior failed push), or empty repo (brand-new package, first-ever push)
          if git show-ref --quiet refs/remotes/origin/master; then
            git checkout master
          elif git rev-parse HEAD 2>/dev/null; then
            git checkout -B master
          else
            git checkout --orphan master
          fi

          # Copy PKGBUILD and all sidecar files (including .SRCINFO generated upstream)
          PKG_DIR="${GITHUB_WORKSPACE}/packaging/arch/${PKGNAME}"
          cp "${PKG_DIR}/PKGBUILD" .
          find "${PKG_DIR}" -maxdepth 1 -type f ! -name PKGBUILD -exec cp -v {} . \;

          # Commit if there are changes
          git config user.name  "Jason Ozias"
          git config user.email "jason.g.ozias@gmail.com"
          git add .
          git diff-index --quiet HEAD 2>/dev/null || git commit -m "Update to v${PKGVER}"

          # Push with retry
          for attempt in 1 2 3; do
            if git push origin master; then
              break
            fi
            if [[ $attempt -lt 3 ]]; then
              echo "Push attempt ${attempt} failed, retrying in 10s..."
              sleep 10
            else
              echo "All push attempts failed."
              exit 1
            fi
          done

  # ── Publish APT and RPM repositories ─────────────────────────────────────────
  publish-packages:
    name: 📦 Publish Package Repository 📦
    if: "!contains(github.ref_name, '-rc')"
    needs: [build, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download release assets
        # v8
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-assets
          path: release-assets/

      - name: Install tools
        run: sudo apt-get install -y apt-utils dpkg-dev createrepo-c

      - name: Import GPG signing key
        run: echo "${{ secrets.PACKAGES_GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Clone salus-packages repo
        env:
          PACKAGES_REPO_TOKEN: ${{ secrets.PACKAGES_REPO_TOKEN }}
        run: |
          git clone \
            "https://oauth2:${PACKAGES_REPO_TOKEN}@github.com/rustyhorde/salus-packages.git" \
            /tmp/salus-packages
          cd /tmp/salus-packages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add DEB packages to APT pool
        run: |
          mkdir -p /tmp/salus-packages/apt/pool/main
          rm -f /tmp/salus-packages/apt/pool/main/*.deb
          cp release-assets/*_amd64.deb /tmp/salus-packages/apt/pool/main/
          cp release-assets/*_arm64.deb /tmp/salus-packages/apt/pool/main/

      - name: Add RPM packages to RPM pool
        run: |
          mkdir -p /tmp/salus-packages/rpm/x86_64 /tmp/salus-packages/rpm/aarch64
          rm -f /tmp/salus-packages/rpm/x86_64/*.rpm /tmp/salus-packages/rpm/aarch64/*.rpm
          cp release-assets/*.x86_64.rpm  /tmp/salus-packages/rpm/x86_64/
          cp release-assets/*.aarch64.rpm /tmp/salus-packages/rpm/aarch64/

      - name: Generate APT repo metadata
        env:
          PACKAGES_GPG_KEY_ID: ${{ secrets.PACKAGES_GPG_KEY_ID }}
        run: |
          cd /tmp/salus-packages
          mkdir -p apt/dists/stable/main/binary-amd64 apt/dists/stable/main/binary-arm64
          mkdir -p /tmp/apt-ftparchive-cache

          cat > apt-ftparchive.conf << 'APTCONF'
          Dir {
            ArchiveDir "apt";
            CacheDir "/tmp/apt-ftparchive-cache";
          };

          Default {
            Packages::Compress ". gzip xz";
          };

          BinDirectory "pool/main" {
            Packages "dists/stable/main/binary-amd64/Packages";
            Architecture "amd64";
          };

          BinDirectory "pool/main" {
            Packages "dists/stable/main/binary-arm64/Packages";
            Architecture "arm64";
          };
          APTCONF

          apt-ftparchive generate apt-ftparchive.conf

          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin=salus \
            -o APT::FTPArchive::Release::Label=salus \
            -o APT::FTPArchive::Release::Suite=stable \
            -o APT::FTPArchive::Release::Codename=stable \
            -o APT::FTPArchive::Release::Architectures="amd64 arm64" \
            -o APT::FTPArchive::Release::Components=main \
            -o APT::FTPArchive::Release::Description="salus package repository" \
            release apt/dists/stable > apt/dists/stable/Release

          gpg --batch --yes \
            --pinentry-mode loopback \
            --local-user "$PACKAGES_GPG_KEY_ID" \
            --armor --clearsign \
            -o apt/dists/stable/InRelease \
            apt/dists/stable/Release

          gpg --batch --yes \
            --pinentry-mode loopback \
            --local-user "$PACKAGES_GPG_KEY_ID" \
            --armor --detach-sign \
            -o apt/dists/stable/Release.gpg \
            apt/dists/stable/Release

      - name: Generate RPM repo metadata
        env:
          PACKAGES_GPG_KEY_ID: ${{ secrets.PACKAGES_GPG_KEY_ID }}
        run: |
          cd /tmp/salus-packages
          for arch in x86_64 aarch64; do
            createrepo_c --update rpm/${arch}/
            gpg --batch --yes \
              --pinentry-mode loopback \
              --local-user "$PACKAGES_GPG_KEY_ID" \
              --armor --detach-sign \
              -o rpm/${arch}/repodata/repomd.xml.asc \
              rpm/${arch}/repodata/repomd.xml
          done

      - name: Commit and push
        env:
          PKGVER: ${{ needs.build.outputs.pkgver }}
        run: |
          cd /tmp/salus-packages
          git add .
          git diff-index --quiet HEAD || git commit -m "Update to v${PKGVER}"
          for attempt in 1 2 3; do
            if git push origin main; then break; fi
            if [[ $attempt -lt 3 ]]; then
              echo "Push attempt ${attempt} failed, retrying in 10s..."
              sleep 10
            else
              echo "All push attempts failed."
              exit 1
            fi
          done

  # ── Update Homebrew tap ──────────────────────────────────────────────────────
  update-homebrew:
    name: 🍺 Update Homebrew Tap 🍺
    if: "!contains(github.ref_name, '-rc')"
    needs: [build, build-macos, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: Wandalen/wretry.action@71a909ebf09f3ffdc6f42a17bd54ecb43481da49 # v3.8.0
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
          attempt_limit: 3
          attempt_delay: 30000

      - name: Download macOS release assets
        # v8
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-assets-macos
          path: release-assets-macos/

      - name: Compute checksums
        id: checksums
        run: |
          echo "salus=$(sha256sum release-assets-macos/salus-aarch64-apple-darwin.tar.gz | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"

      - name: Generate formula file
        env:
          PKGVER: ${{ needs.build.outputs.pkgver }}
          SALUS_MACOS_SHA256: ${{ steps.checksums.outputs.salus }}
        run: |
          sed -e "s/PKGVER/${PKGVER}/g" \
              -e "s/SALUS_MACOS_SHA256/${SALUS_MACOS_SHA256}/" \
              packaging/homebrew/salus.rb.tmpl > salus.rb

      - name: Push to Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          PKGVER: ${{ needs.build.outputs.pkgver }}
        run: |
          set -euo pipefail

          git clone "https://oauth2:${HOMEBREW_TAP_TOKEN}@github.com/rustyhorde/homebrew-salus.git" /tmp/tap
          mkdir -p /tmp/tap/Formula
          cp salus.rb /tmp/tap/Formula/salus.rb
          cd /tmp/tap
          # Handle all tap repo states: normal (origin/master tracked), detached HEAD
          # (prior failed push), or empty repo (brand-new tap, first-ever push)
          if git show-ref --quiet refs/remotes/origin/master; then
            git checkout master
          elif git rev-parse HEAD 2>/dev/null; then
            git checkout -B master
          else
            git checkout --orphan master
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/
          git diff-index --quiet HEAD 2>/dev/null || git commit -m "Update to v${PKGVER}"

          for attempt in 1 2 3; do
            if git push origin master; then
              break
            fi
            if [[ $attempt -lt 3 ]]; then
              echo "Push attempt ${attempt} failed, retrying in 10s..."
              sleep 10
            else
              echo "All push attempts failed."
              exit 1
            fi
          done
